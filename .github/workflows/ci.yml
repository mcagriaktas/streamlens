name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  server-tests:
    name: Server Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run unit tests with coverage
        run: uv run pytest tests/unit -v --cov=src --cov-report=xml:coverage.xml

      - name: Post server coverage to PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: server
        run: |
          TOTAL=$(uv run python -c "
          import xml.etree.ElementTree as ET
          rate = float(ET.parse('coverage.xml').getroot().attrib['line-rate'])
          print(f'{rate * 100:.0f}')
          ")
          TABLE=$(uv run python -m coverage report --format=markdown 2>/dev/null || uv run python -m coverage report)
          COMMENT_TAG="<!-- server-coverage -->"
          EXISTING=$(gh pr view ${{ github.event.pull_request.number }} --json comments --jq ".comments[] | select(.body | contains(\"${COMMENT_TAG}\")) | .id" | head -1)
          if [ -n "$EXISTING" ]; then
            gh api graphql -f query="mutation { deleteIssueComment(input: {id: \"${EXISTING}\"}) { clientMutationId } }" 2>/dev/null || true
          fi
          BODY="${COMMENT_TAG}
          ## Tests Coverage - Server
          **Overall: ${TOTAL}%**

          ${TABLE}"
          gh pr comment ${{ github.event.pull_request.number }} --body "${BODY}"

  server-integration-tests:
    name: Server Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Start Kafka, Schema Registry, and Kafka Connect
        working-directory: .
        run: |
          docker compose -f container/docker-compose.yml up -d
          echo "Waiting for services to be healthy..."
          timeout 180 bash -c 'until [ "$(docker compose -f container/docker-compose.yml ps --format json | grep -o "\"healthy\"" | wc -l)" -ge 3 ]; do sleep 3; done'
          docker compose -f container/docker-compose.yml ps

      - name: Run integration tests
        run: uv run pytest tests/integration -v

      - name: Stop services
        if: always()
        working-directory: .
        run: docker compose -f container/docker-compose.yml down -v

  client-tests:
    name: Client Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Client coverage comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: client
          name: "Tests Coverage - Frontend"

  client-build:
    name: Client Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
